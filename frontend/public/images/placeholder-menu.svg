<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="menuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A5F42;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#menuGrad)"/>
  
  <!-- Plate/dish representation -->
  <circle cx="200" cy="150" r="60" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
  <circle cx="200" cy="150" r="40" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Food items on plate -->
  <circle cx="185" cy="135" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="215" cy="135" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="200" cy="165" r="10" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Utensils -->
  <line x1="120" y1="120" x2="120" y2="180" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="115" y1="125" x2="125" y2="125" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="120" x2="280" y2="180" stroke="white" stroke-width="2" opacity="0.6"/>
  
  <text x="200" y="230" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Delicious Menu</text>
  <text x="200" y="250" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="12">Fresh & Tasty</text>
</svg>